name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: 의존성 설치
        run: uv sync --frozen
      - name: 린트
        run: uv run ruff check packages/
      - name: 포맷 검사
        run: uv run ruff format --check packages/
      - name: 테스트
        run: uv run pytest -q packages/
