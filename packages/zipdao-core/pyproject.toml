[project]
name = "zipdao-core"
version = "0.1.0"
description = "공공임대 크롤러 공통 코어 (설정·HTTP·저장소·모델)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zipdao_core"]
