[project]
name = "zipdao-core"
version = "0.1.0"
description = "공공임대 크롤러 공통 코어 (설정·HTTP·저장소·모델)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "certifi>=2024.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zipdao_core"]
# 기관 서버 TLS 호환용 CA 중간 인증서(.pem)를 wheel 에 포함(기본은 .py 만 담긴다)
force-include = { "src/zipdao_core/certs" = "zipdao_core/certs" }
