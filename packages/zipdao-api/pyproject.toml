[project]
name = "zipdao-api"
version = "0.1.0"
description = "공공임대 공고 서빙 API (MCP 서버용)"
requires-python = ">=3.11"
dependencies = [
    "zipdao-core",
    "zipdao-crawlers",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zipdao_api"]
