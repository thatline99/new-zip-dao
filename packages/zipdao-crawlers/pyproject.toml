[project]
name = "zipdao-crawlers"
version = "0.1.0"
description = "공공임대 공고 사이트별 크롤러 + 수집 엔진 + CLI"
requires-python = ">=3.11"
dependencies = [
    "zipdao-core",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "pdfplumber>=0.11.10",
]

[project.scripts]
zipdao-crawl = "zipdao_crawlers.cli:main"

[tool.uv.sources]
zipdao-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zipdao_crawlers"]
